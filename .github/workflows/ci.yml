name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: order_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Order Service Tests
        run: |
          cd order-service
          mvn test -Dspring.datasource.url=jdbc:postgresql://localhost:5432/order_db \
                   -Dspring.datasource.username=postgres \
                   -Dspring.datasource.password=postgres \
                   -Dspring.kafka.bootstrap-servers=localhost:9092

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build all services
        run: |
          cd order-service && mvn clean package -DskipTests && cd ..
          cd inventory-service && mvn clean package -DskipTests && cd ..
          cd warehouse-service && mvn clean package -DskipTests && cd ..
          cd delivery-service && mvn clean package -DskipTests && cd ..
          cd notification-service && mvn clean package -DskipTests && cd ..
          cd recommendation-service && mvn clean package -DskipTests && cd ..
          cd api-gateway && mvn clean package -DskipTests && cd ..

      - name: Build Docker images
        run: |
          docker build -t order-service:latest ./order-service
          docker build -t inventory-service:latest ./inventory-service
          docker build -t api-gateway:latest ./api-gateway