server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        routes:
          - id: order-service
            uri: http://localhost:8081
            predicates:
              - Path=/api/orders/**

          - id: inventory-service
            uri: http://localhost:8082
            predicates:
              - Path=/api/inventory/**

          - id: warehouse-service
            uri: http://localhost:8083
            predicates:
              - Path=/api/warehouses/**

          - id: delivery-service
            uri: http://localhost:8084
            predicates:
              - Path=/api/deliveries/**

          - id: notification-service
            uri: http://localhost:8085
            predicates:
              - Path=/api/notifications/**

          - id: recommendation-service
            uri: http://localhost:8086
            predicates:
              - Path=/api/recommendations/**

management:
  endpoints:
    web:
      exposure:
        include: health,info